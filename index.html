<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gunes TV</title>
    <meta
      name="description"
      content="Gunes TV resmi destek sayfasi. Uygulama bilgileri, iletisim ve gizlilik politikasi."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #101828;
        --muted: #475467;
        --line: #d0d5dd;
        --accent: #f79009;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top, #fff3d6 0, #f6f7fb 42%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 48px auto;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(16, 24, 40, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.65;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #fff1cc;
        color: #9a6700;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .list {
        margin-top: 22px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
      }

      .list p {
        margin-bottom: 10px;
      }

      a {
        color: #0057c2;
      }

      code {
        font-family: Consolas, "Courier New", monospace;
        background: #f2f4f7;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="badge">Resmi Destek Sayfasi</div>
        <h1>Gunes TV</h1>
        <p>
          Gunes TV uygulamasi icin resmi iletisim ve destek sayfasidir.
        </p>
        <p>
          Paket adi: <code>com.gunes.tv</code>
        </p>
        <div class="list">
          <p>
            E-posta:
            <a href="mailto:oktay2617@gmail.com">oktay2617@gmail.com</a>
          </p>
          <p>
            Gizlilik Politikasi:
            <a href="https://oktay2617.github.io/gunes-tv-privacy/">
              https://oktay2617.github.io/gunes-tv-privacy/
            </a>
          </p>
          <p>
            app-ads.txt:
            <a href="/app-ads.txt">/app-ads.txt</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
